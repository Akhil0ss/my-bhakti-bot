name: YouTube Automation (12-Slot Daily)

on:
  schedule:
    # --- BHAKTI (IST Focused) ---
    - cron: '30 1 * * *'    # 07:00 AM IST
    - cron: '30 5 * * *'    # 11:00 AM IST
    - cron: '30 10 * * *'   # 04:00 PM IST
    - cron: '30 14 * * *'   # 08:00 PM IST
    
    # --- AKONYMOUS (Global) ---
    - cron: '30 3 * * *'    # 09:00 AM IST
    - cron: '30 8 * * *'    # 02:00 PM IST
    - cron: '30 13 * * *'   # 07:00 PM IST
    - cron: '30 18 * * *'   # 12:00 AM IST
    
    # --- MOTIVATION (Global) ---
    - cron: '30 4 * * *'    # 10:00 AM IST
    - cron: '30 9 * * *'    # 03:00 PM IST
    - cron: '30 15 * * *'   # 09:00 PM IST
    - cron: '30 20 * * *'   # 02:00 AM IST

  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche to run manually'
        required: true
        default: 'bhakti'
        type: choice
        options:
          - bhakti
          - akonymous
          - motivation

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Determine Niche
        id: niche_selector
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "NICHE=${{ github.event.inputs.niche }}" >> $GITHUB_ENV
          else
            case "${{ github.event.schedule }}" in
              "30 1 * * *"|"30 5 * * *"|"30 10 * * *"|"30 14 * * *") echo "NICHE=bhakti" >> $GITHUB_ENV ;;
              "30 3 * * *"|"30 8 * * *"|"30 13 * * *"|"30 18 * * *") echo "NICHE=akonymous" >> $GITHUB_ENV ;;
              "30 4 * * *"|"30 9 * * *"|"30 15 * * *"|"30 20 * * *") echo "NICHE=motivation" >> $GITHUB_ENV ;;
            esac
          fi

      - name: Setup Secrets
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "DRIVE_FOLDER_ID_BHAKTI=${{ secrets.DRIVE_FOLDER_ID_BHAKTI }}" >> .env
          echo "DRIVE_FOLDER_ID_AKONYMOUS=${{ secrets.DRIVE_FOLDER_ID_AKONYMOUS }}" >> .env
          echo "DRIVE_FOLDER_ID_MOTIVATION=${{ secrets.DRIVE_FOLDER_ID_MOTIVATION }}" >> .env
          echo "${{ secrets.YT_DLP_COOKIES }}" > cookies.txt
          
          if [ "$NICHE" == "bhakti" ]; then
            echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token_bhakti.json
          elif [ "$NICHE" == "akonymous" ]; then
            echo '${{ secrets.YOUTUBE_TOKEN_JSON_AKONYMOUS }}' > token_akonymous.json
          elif [ "$NICHE" == "motivation" ]; then
            echo '${{ secrets.YOUTUBE_TOKEN_JSON_MOTIVATION }}' > token_motivation.json
          fi

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            download_history_*.txt
            strategy_data
            scheduled_queue
            output/scheduled_parts
          key: youtube-history-${{ env.NICHE }}-${{ github.run_id }}
          restore-keys: youtube-history-${{ env.NICHE }}-

      - name: Run Engine
        run: python main.py --niche $NICHE --cookies cookies.txt

      - name: Save Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            download_history_*.txt
            strategy_data
            scheduled_queue
            output/scheduled_parts
          key: youtube-history-${{ env.NICHE }}-${{ github.run_id }}
