name: Bhakti Daily Automation
on:
  schedule:
    - cron: '0 2 * * *'    # 07:30 AM IST
    - cron: '0 8 * * *'    # 01:30 PM IST
    - cron: '0 14 * * *'   # 07:30 PM IST
  workflow_dispatch: {}
jobs:
  upload-bhakti:
    concurrency:
      group: bhakti-automation
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
      - name: Setup Secrets
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "DRIVE_FOLDER_ID_BHAKTI=${{ secrets.DRIVE_FOLDER_ID_BHAKTI }}" >> .env
          echo "${{ secrets.YT_DLP_COOKIES }}" > cookies.txt
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token_bhakti.json
      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            download_history_bhakti.txt
            strategy_data
            scheduled_queue
            output/scheduled_parts
          key: history-bhakti-${{ github.run_id }}
          restore-keys: history-bhakti-
      - name: Run Bhakti Engine
        run: python main.py --niche bhakti --cookies cookies.txt
      - name: Save Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            download_history_bhakti.txt
            strategy_data
            scheduled_queue
            output/scheduled_parts
          key: history-bhakti-${{ github.run_id }}
