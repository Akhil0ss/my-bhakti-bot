name: Grind Minds (Motivation) Automation

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '30 10 * * *'  # 04:00 PM IST
    - cron: '30 14 * * *'  # 08:00 PM IST
    - cron: '30 18 * * *'  # 12:00 AM IST
    - cron: '30 22 * * *'  # 04:00 AM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/set-up-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Motivation Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_TOKEN_JSON_MOTIVATION: ${{ secrets.YOUTUBE_TOKEN_JSON_MOTIVATION }}
        run: |
          echo "$YOUTUBE_TOKEN_JSON_MOTIVATION" > token_motivation.json
          python main.py --niche motivation
