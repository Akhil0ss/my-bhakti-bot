name: Grind Minds (Motivation) Automation

on:
  schedule:
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '30 10 * * *'  # 04:00 PM IST
    - cron: '30 14 * * *'  # 08:00 PM IST
    - cron: '30 18 * * *'  # 12:00 AM IST
    - cron: '30 22 * * *'  # 04:00 AM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Secrets
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo '${{ secrets.YOUTUBE_TOKEN_JSON_MOTIVATION }}' > token_motivation.json

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            download_history_motivation.txt
            strategy_data
          key: history-motivation-${{ github.run_id }}
          restore-keys: history-motivation-

      - name: Run Motivation Bot
        run: python main.py --niche motivation

      - name: Save Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            download_history_motivation.txt
            strategy_data
          key: history-motivation-${{ github.run_id }}
