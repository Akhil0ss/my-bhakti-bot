name: Akonymous Daily Automation
on:
  schedule:
    - cron: '0 6 * * *'    # 11:30 AM IST
    - cron: '0 13 * * *'   # 06:30 PM IST
    - cron: '0 21 * * *'   # 02:30 AM IST
  workflow_dispatch: {}
jobs:
  upload-akonymous:
    concurrency:
      group: akonymous-automation
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
      - name: Setup Secrets
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "DRIVE_FOLDER_ID_AKONYMOUS=${{ secrets.DRIVE_FOLDER_ID_AKONYMOUS }}" >> .env
          echo "${{ secrets.YT_DLP_COOKIES }}" > cookies.txt
          echo '${{ secrets.YOUTUBE_TOKEN_JSON_AKONYMOUS }}' > token_akonymous.json
      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            download_history_akonymous.txt
            strategy_data
          key: history-akonymous-${{ github.run_id }}
          restore-keys: history-akonymous-
      - name: Run Akonymous Engine
        run: python main.py --niche akonymous --cookies cookies.txt
      - name: Save Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            download_history_akonymous.txt
            strategy_data
          key: history-akonymous-${{ github.run_id }}
