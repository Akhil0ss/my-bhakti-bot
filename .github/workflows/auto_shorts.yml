name: Aura Shorts Auto Upload
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'    # 07:30 AM IST (Morning Puja/Commute)
    - cron: '0 8 * * *'    # 01:30 PM IST (Lunch Break)
    - cron: '30 12 * * *'  # 06:00 PM IST (Evening Rush)
    - cron: '30 14 * * *'  # 08:00 PM IST (Prime Peak)
    - cron: '30 16 * * *'  # 10:00 PM IST (Late Night Peace)
    - cron: '0 19 * * *'   # 12:30 AM IST (Extra Night Buffer)
  workflow_dispatch: {}
jobs:
  upload-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        niche: [bhakti, akonymous]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          pip install -U --pre yt-dlp
      - name: Setup Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "${{ secrets.YT_DLP_COOKIES }}" > cookies.txt
          
          # Inject the correct YouTube Token based on the niche
          if [[ "${{ matrix.niche }}" == "bhakti" ]]; then
            echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token_bhakti.json
          else
            echo '${{ secrets.YOUTUBE_TOKEN_JSON_AKONYMOUS }}' > token_akonymous.json
          fi

      - name: Restore History Cache
        uses: actions/cache/restore@v4
        with:
          path: download_history_${{ matrix.niche }}.txt
          key: history-${{ matrix.niche }}-${{ github.run_id }}
          restore-keys: history-${{ matrix.niche }}-

      - name: Run Aura Engine
        run: python main.py --niche ${{ matrix.niche }} --cookies cookies.txt

      - name: Save History Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: download_history_${{ matrix.niche }}.txt
          key: history-${{ matrix.niche }}-${{ github.run_id }}
