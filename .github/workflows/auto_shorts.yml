name: Aura Shorts Auto Upload
on:
  schedule:
    - cron: '0 2 * * *'    # 07:30 AM IST (Morning Puja/Commute)
    - cron: '0 8 * * *'    # 01:30 PM IST (Lunch Break)
    - cron: '30 12 * * *'  # 06:00 PM IST (Evening Rush)
    - cron: '30 14 * * *'  # 08:00 PM IST (Prime Peak)
    - cron: '30 16 * * *'  # 10:00 PM IST (Late Night Peace)
    - cron: '0 19 * * *'   # 12:30 AM IST (Extra Night Buffer)
  workflow_dispatch: {}
jobs:
  upload-short:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt
          pip install -U --pre yt-dlp
      - name: Setup Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo "${{ secrets.YT_DLP_COOKIES }}" > cookies.txt
      - uses: actions/cache@v4
        with:
          path: downloaded.txt
          key: download-history-${{ github.run_number }}
          restore-keys: download-history-
      - name: Run Aura Engine
        run: python main.py --cookies cookies.txt
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: downloaded.txt
          key: download-history-${{ github.run_number }}
