name: Aura Shorts Auto Upload
on:
  schedule:
    - cron: '30 23 * * *'
    - cron: '30 2 * * *'
    - cron: '30 6 * * *'
    - cron: '30 13 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch: {}
jobs:
  upload-short:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          pip install -U --pre yt-dlp
      - run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YT_DLP_COOKIES }}' > cookies.json
      - uses: actions/cache@v4
        with:
          path: downloaded.txt
          key: download-history-${{ github.run_number }}
          restore-keys: download-history-
      - run: python main.py --cookies cookies.json
      - if: always()
        uses: actions/cache/save@v4
        with:
          path: downloaded.txt
          key: download-history-${{ github.run_number }}
